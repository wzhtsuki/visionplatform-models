name: Sync auto-labeling assets

on:
  workflow_dispatch:
    inputs:
      chunk_size:
        description: Files handled by each job
        required: false
        default: "10"

permissions:
  contents: write

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: plan
        env:
          CHUNK_SIZE: ${{ github.event.inputs.chunk_size || '10' }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          manifest = json.loads(Path("mirror_manifest.json").read_text(encoding="utf-8"))
          entries = manifest["entries"]
          chunk_size = max(1, int(os.environ.get("CHUNK_SIZE", "10")))

          matrix = []
          for start in range(0, len(entries), chunk_size):
              matrix.append(
                  {
                      "start": start,
                      "end": min(start + chunk_size, len(entries)),
                  }
              )

          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as file:
              file.write(f"matrix={json.dumps(matrix, separators=(',', ':'))}\n")
          PY

  sync:
    needs: plan
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        chunk: ${{ fromJson(needs.plan.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip requests
      - name: Sync release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RELEASE_TAG: v1
          START_INDEX: ${{ matrix.chunk.start }}
          END_INDEX: ${{ matrix.chunk.end }}
        run: python scripts/sync_release_assets.py
